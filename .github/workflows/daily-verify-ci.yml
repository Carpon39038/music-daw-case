name: daily-verify-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  verify-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Run daily verify
        id: verify
        run: pnpm run verify:ci
      - name: Upload harness outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-metrics-${{ github.run_id }}
          path: |
            harness/metrics/*.md
            harness/metrics/*.json
            harness/metrics/judgements/*.md
            harness/metrics/judgements/*.json
            reports/eval/*.md
      - name: Notify Feishu on failure
        if: failure() && secrets.FEISHU_BOT_WEBHOOK_URL != ''
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_BOT_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_BOT_WEBHOOK_SECRET }}
        run: |
          MSG="❌ daily-verify-ci 失败\nrepo: ${{ github.repository }}\nbranch: ${{ github.ref_name }}\nrun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nactor: ${{ github.actor }}"
          if [ -n "$FEISHU_WEBHOOK_SECRET" ]; then
            export TS=$(date +%s)
            SIGN=$(python3 -c "import base64,hashlib,hmac,os;secret=os.environ['FEISHU_WEBHOOK_SECRET'];ts=os.environ['TS'];s=f'{ts}\\n{secret}'.encode('utf-8');d=hmac.new(secret.encode('utf-8'), s, digestmod=hashlib.sha256).digest();print(base64.b64encode(d).decode())")
            curl -sS -X POST "$FEISHU_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"timestamp\":\"$TS\",\"sign\":\"$SIGN\",\"msg_type\":\"text\",\"content\":{\"text\":\"$MSG\"}}" >/dev/null
          else
            curl -sS -X POST "$FEISHU_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"$MSG\"}}" >/dev/null
          fi

      - name: Fail-only reminder (create issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Daily verify: FAIL (${new Date().toISOString().slice(0,10)})`;
            const body = [
              'daily verify:ci failed.',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'This issue is fail-only reminder, auto-created by workflow.'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci', 'daily-verify', 'failure']
            });
