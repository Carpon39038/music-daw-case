name: daily-verify-ci

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  verify-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run daily verify
        id: verify
        run: pnpm run verify:ci
      - name: Upload harness outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-metrics-${{ github.run_id }}
          path: |
            harness/metrics/*.md
            harness/metrics/*.json
            harness/metrics/judgements/*.md
            harness/metrics/judgements/*.json
            reports/eval/*.md
      - name: Fail-only reminder (create issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Daily verify: FAIL (${new Date().toISOString().slice(0,10)})`;
            const body = [
              'daily verify:ci failed.',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'This issue is fail-only reminder, auto-created by workflow.'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci', 'daily-verify', 'failure']
            });
